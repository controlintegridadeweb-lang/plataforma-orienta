name: ci

on:
  push:
    branches: ["**"]
  pull_request:

defaults:
  run:
    working-directory: orienta-v1

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: orienta-v1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check V2 terminology
        run: npm run check:v2-terminology

      - name: Check V2 SQL contract
        run: npm run check:v2-sql-contract

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
